name: Release Desktop Bundle

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: museai-macos
            args: "--target aarch64-apple-darwin"
            bundles: |
              src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app
          - os: windows-latest
            artifact_name: museai-windows
            args: ""
            bundles: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - os: ubuntu-22.04
            artifact_name: museai-linux
            args: ""
            bundles: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/rpm/*.rpm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install macOS DMG dependencies
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Tauri release assets
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('manual-v__VERSION__-{0}', github.run_number) }}
          releaseName: "MuseAI v__VERSION__"
          releaseBody: "See the assets to download and install this release."
          releaseDraft: ${{ github.event_name == 'workflow_dispatch' }}
          prerelease: false
          generateReleaseNotes: true
          uploadWorkflowArtifacts: true
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundles }}
